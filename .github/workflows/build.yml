name: 导出OpenWrt官方rootfs
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 下载官方rootfs（wget强制失败模式）
        run: |
          wget -f -O OpenWrt-ARM64-Docker.tar.gz https://github.com/openwrt/openwrt/releases/download/v23.05.5/openwrt-23.05.5-armvirt-64-default-rootfs.tar.gz

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-ARM64-Docker
          path: OpenWrt-ARM64-Docker.tar.gz
