name: OpenWrt Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y build-essential libssl-dev git wget curl file python3 python3-distutils rsync unzip

      - name: Download SDK
        run: |
          wget https://mirrors.tuna.tsinghua.edu.cn/openwrt/releases/23.05.5/targets/armvirt/64/openwrt-sdk-23.05.5-armvirt-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-23.05.5-armvirt-64_gcc-12.3.0_musl.Linux-x86_64 openwrt-sdk
          cd openwrt-sdk
          cp $GITHUB_WORKSPACE/feeds.conf feeds.conf.default
          cp $GITHUB_WORKSPACE/.config .config

      - name: Feeds Update & Install
        run: |
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Compile
        run: |
          cd openwrt-sdk
          make defconfig
          make -j2

      - name: Upload Rootfs
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-output
          path: openwrt-sdk/bin/targets/armvirt/64/*.tar.gz
