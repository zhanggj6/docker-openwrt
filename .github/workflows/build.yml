name: Build OpenWrt
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libssl-dev git wget curl file python3 python3-distutils rsync unzip

      - name: Download OpenWrt SDK
        run: |
          wget -q https://downloads.openwrt.org/releases/23.05.5/targets/armvirt/64/openwrt-sdk-23.05.5-armvirt-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* openwrt-sdk
          cd openwrt-sdk
          cp $GITHUB_WORKSPACE/feeds.conf feeds.conf.default
          cp $GITHUB_WORKSPACE/.config .config

      - name: Update feeds and compile
        run: |
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make -j$(nproc)

      - name: Upload rootfs
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-rootfs
          path: openwrt-sdk/bin/targets/armvirt/64/openwrt-*-rootfs.tar.gz
