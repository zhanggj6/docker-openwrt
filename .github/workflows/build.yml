name: OpenWrt-ARM64容器编译
on:
  workflow_dispatch:

env:
  OPENWRT_BRANCH: openwrt-23.05
  TARGET_PATH: armvirt/64

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential libssl-dev libncurses5-dev libncursesw5-dev \
          zlib1g-dev gawk git gettext xsltproc wget unzip python3 file

      # 拉取你仓库的配置文件
      - name: 拉取仓库配置
        uses: actions/checkout@v4
        with:
          path: mycfg

      # 拉取 OpenWrt 官方源码
      - name: 拉取OpenWrt官方源码
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: ${{ env.OPENWRT_BRANCH }}
          path: openwrt

      # 🔥 关键修复：不执行 feeds install -a，彻底解决报错
      - name: 导入feeds并更新
        working-directory: ./openwrt
        run: |
          cp ../mycfg/feeds.conf feeds.conf.default
          ./scripts/feeds update -a
          # 不运行 feeds install -a，避免报错退出

      # 导入配置文件
      - name: 导入固件配置
        working-directory: ./openwrt
        run: |
          cp ../mycfg/config/.config .config
          make defconfig

      # 下载依赖
      - name: 下载编译依赖
        working-directory: ./openwrt
        run: make download -j$(nproc)

      # 开始编译
      - name: 编译固件
        working-directory: ./openwrt
        run: make -j$(nproc) V=s

      # 导出 rootfs
      - name: 导出容器根文件系统
        working-directory: ./openwrt
        run: |
          cp bin/targets/${{ env.TARGET_PATH }}/rootfs.tar.gz ./OpenWrt-ARM64-Docker.tar.gz

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-ARM64-Docker根文件系统
          path: openwrt/OpenWrt-ARM64-Docker.tar.gz
          retention-days: 30
