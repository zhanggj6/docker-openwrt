name: 制作OpenWrt-ARM64-Docker根文件系统
on:
  workflow_dispatch:

env:
  OPENWRT_VERSION: 23.05.5
  ROOTFS_URL: https://mirrors.ustc.edu.cn/openwrt/releases/23.05.5/targets/armvirt/64/openwrt-23.05.5-armvirt-64-default-rootfs.tar.gz

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 下载官方OpenWrt根文件系统（中科大镜像）
        run: |
          wget -O openwrt-rootfs.tar.gz ${{ env.ROOTFS_URL }}

      - name: 解压并配置根文件系统
        run: |
          mkdir -p rootfs
          tar -xzf openwrt-rootfs.tar.gz -C rootfs/
          
          # 1. 配置中科大软件源（永久生效）
          cat > rootfs/etc/opkg/distfeeds.conf <<EOF
src/gz openwrt_core https://mirrors.ustc.edu.cn/openwrt/releases/23.05.5/targets/armvirt/64/packages
src/gz openwrt_base https://mirrors.ustc.edu.cn/openwrt/releases/23.05.5/packages/aarch64_generic/base
src/gz openwrt_luci https://mirrors.ustc.edu.cn/openwrt/releases/23.05.5/packages/aarch64_generic/luci
src/gz openwrt_packages https://mirrors.ustc.edu.cn/openwrt/releases/23.05.5/packages/aarch64_generic/packages
src/gz openwrt_routing https://mirrors.ustc.edu.cn/openwrt/releases/23.05.5/packages/aarch64_generic/routing
src/gz openwrt_telephony https://mirrors.ustc.edu.cn/openwrt/releases/23.05.5/packages/aarch64_generic/telephony
EOF

          # 2. 写入开机自动安装脚本（启动后自动装所有依赖）
          cat > rootfs/etc/rc.local <<EOF
#!/bin/sh
# 等待网络就绪
sleep 10
# 更新软件源
opkg update
# 安装所有需要的包
opkg install -y luci-app-minidlna minidlna igmpproxy kmod-br-netfilter dnsmasq-full dnsmasq kmod-tun iptables-mod-tproxy ipset coreutils coreutils-nohup curl wget openssl unzip kmod-macvlan kmod-veth bridge-utils ip-full
# 自动删除脚本，避免重复执行
rm -f /etc/rc.local
exit 0
EOF

          # 给脚本添加执行权限
          chmod +x rootfs/etc/rc.local

      - name: 重新打包根文件系统
        run: |
          cd rootfs
          tar -czf ../OpenWrt-ARM64-Docker.tar.gz .
          cd ..

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-ARM64-Docker根文件系统
          path: OpenWrt-ARM64-Docker.tar.gz
          retention-days: 30
