name: OpenWrt SDK Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Build Deps
        run: |
          sudo apt update -y
          sudo apt install -y \
            build-essential libssl-dev git wget curl file \
            python3 python3-distutils rsync unzip

      - name: Download & Extract SDK (中科大镜像源)
        run: |
          mkdir -p ./build_workspace
          cd ./build_workspace
          # 换成稳定的中科大镜像地址
          wget -q https://mirrors.ustc.edu.cn/openwrt/releases/23.05.5/targets/armvirt/64/openwrt-sdk-23.05.5-armvirt-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* sdk

      - name: Load External feeds.conf
        run: |
          cd ./build_workspace/sdk
          cp ${{ github.workspace }}/feeds.conf feeds.conf.default

      - name: Load External .config
        run: |
          cd ./build_workspace/sdk
          cp ${{ github.workspace }}/.config .config

      - name: Update & Install Feeds
        run: |
          cd ./build_workspace/sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Compile OpenWrt
        run: |
          cd ./build_workspace/sdk
          make defconfig
          make -j$(nproc)

      - name: Collect Rootfs
        run: |
          cp ./build_workspace/sdk/bin/targets/armvirt/64/openwrt-*-rootfs.tar.gz ./build_workspace/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-Full-Rootfs
          path: ./build_workspace/*.tar.gz
