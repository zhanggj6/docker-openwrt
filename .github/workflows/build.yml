name: 制作OpenWrt-ARM64-Docker根文件系统
on:
  workflow_dispatch:

env:
  OPENWRT_VERSION: 23.05.5
  TARGET_PATH: armvirt/64
  OFFICIAL_ROOTFS_URL: https://downloads.openwrt.org/releases/23.05.5/targets/armvirt/64/openwrt-23.05.5-armvirt-64-default-rootfs.tar.gz

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库配置
        uses: actions/checkout@v4
        with:
          path: mycfg

      - name: 下载官方OpenWrt根文件系统
        run: |
          wget -O openwrt-rootfs.tar.gz ${{ env.OFFICIAL_ROOTFS_URL }}

      - name: 解压并修改根文件系统（预装依赖）
        run: |
          mkdir -p rootfs
          tar -xzf openwrt-rootfs.tar.gz -C rootfs/
          
          # 1. 配置软件源
          cp mycfg/feeds.conf rootfs/etc/opkg/distfeeds.conf
          
          # 2. 预装所有依赖包（直接写入文件系统）
          chroot rootfs /bin/sh -c "opkg update && opkg install -y \
            luci-app-minidlna minidlna \
            igmpproxy kmod-br-netfilter \
            dnsmasq-full dnsmasq kmod-tun iptables-mod-tproxy ipset coreutils coreutils-nohup \
            curl wget openssl unzip \
            kmod-macvlan kmod-veth bridge-utils ip-full"

      - name: 重新打包根文件系统
        run: |
          cd rootfs
          tar -czf ../OpenWrt-ARM64-Docker.tar.gz .
          cd ..

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-ARM64-Docker根文件系统
          path: OpenWrt-ARM64-Docker.tar.gz
          retention-days: 30
