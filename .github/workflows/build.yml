name: OpenWrt SDK Build
on:
  workflow_dispatch:

env:
  OW_VER: 23.05.5
  OW_TGT: armvirt
  OW_SUB: 64
  SDK_NAME: openwrt-sdk-${{ env.OW_VER }}-${{ env.OW_TGT }}-${{ env.OW_SUB }}_gcc-12.3.0_musl.Linux-x86_64.tar.xz
  SDK_URL: https://downloads.openwrt.org/releases/${{ env.OW_VER }}/targets/${{ env.OW_TGT }}/${{ env.OW_SUB }}
  BUILD_DIR: ./build_workspace
  LOCAL_FEEDS: feeds.conf
  LOCAL_CONFIG: .config

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Build Deps
        run: |
          sudo apt update -y
          sudo apt install -y build-essential libssl-dev git wget curl file python3-distutils

      - name: Download & Extract SDK
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          wget -q ${{ env.SDK_URL }}/${{ env.SDK_NAME }}
          tar -xf ${{ env.SDK_NAME }}
          mv openwrt-sdk-* sdk

      - name: Load External feeds.conf
        run: |
          cd ${{ env.BUILD_DIR }}/sdk
          cp ${{ github.workspace }}/${{ env.LOCAL_FEEDS }} feeds.conf.default

      - name: Load External .config
        run: |
          cd ${{ env.BUILD_DIR }}/sdk
          cp ${{ github.workspace }}/${{ env.LOCAL_CONFIG }} .config

      - name: Update & Install Feeds
        run: |
          cd ${{ env.BUILD_DIR }}/sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Compile OpenWrt
        run: |
          cd ${{ env.BUILD_DIR }}/sdk
          make defconfig
          make -j$(nproc)

      - name: Collect Rootfs
        run: |
          cp ${{ env.BUILD_DIR }}/sdk/bin/targets/${{ env.OW_TGT }}/${{ env.OW_SUB }}/openwrt-*-rootfs.tar.gz ${{ env.BUILD_DIR }}/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-Full-Rootfs
          path: ${{ env.BUILD_DIR }}/*.tar.gz
